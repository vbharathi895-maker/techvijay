<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Profile Finder</title>
    <link rel="stylesheet" href="styles.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fab fa-github"></i> GitHub Finder</h1>
            <p>Find any GitHub profile easily</p>
        </header>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Enter GitHub username..." autocomplete="off">
            <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
        </div>

        <!-- Profile data will be injected here via JS -->
        <div id="profile" class="profile-container hidden"></div>
        
        <!-- Error message will be injected here via JS -->
        <div id="error" class="error-container hidden"></div>
    </div>

    <script src="index.js"></script>
</body>
</html>
